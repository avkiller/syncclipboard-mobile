name: android build for avkiller

on:
  workflow_call:
    outputs:
      version:
        description: "App version from package.json"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --no-install
        
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android_release.keystore

      - name: Build Android APK
        run: npm run build:apk
        env:
          # 以下变量会被 Expo 生成的 Gradle 脚本自动识别或用于覆盖
          RELEASE_STORE_FILE: ../../android_release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          
          # 如果项目底层直接用的是标准 RN 变量名，也一并加上以保万一
          MYAPP_RELEASE_STORE_FILE: ../../android_release.keystore
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease

      - name: Get version name
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APKs
        run: |
          cd android/app/build/outputs/apk/release
          VERSION=${{ steps.version.outputs.version }}
          for ABI in arm64-v8a armeabi-v7a x86_64 universal; do
            SRC="app-${ABI}-release.apk"
            if [ -f "$SRC" ]; then
              mv "$SRC" "SyncClipboard-${VERSION}-${ABI}.apk"
            fi
          done

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          name: apk-arm64-v8a
          path: android/app/build/outputs/apk/release/SyncClipboard-${{ steps.version.outputs.version }}-arm64-v8a.apk

      
