name: android build for avkiller

on:
  workflow_call:
    outputs:
      version:
        description: "App version from package.json"
        value: ${{ jobs.build.outputs.version }}
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: 'release tags(Default: v1.1.3)'
        required: true
        default: 'v1.1.3'


jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
          VERSION: ${{ inputs.version }}
          TAG_NAME: ${{ inputs.version }}
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --no-install

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/android_release.keystore 

      - name: Configure Gradle Properties
        run: |
          # 将签名信息写入 gradle.properties，Gradle 会自动识别这些变量
          cat <<EOF >> android/gradle.properties
          RELEASE_STORE_FILE=android_release.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          android.defaults.buildfeatures.buildconfig=true
          EOF

      - name: Inject Signing Config to build.gradle
        if: false
        run: |
          # 仅插入签名配置 logic，不重复外层的 android {} 块
          # 这里的逻辑是：在 android 块内部查找并替换
          sed -i '/defaultConfig {/i \
          signingConfigs { \
              release { \
                  storeFile file(RELEASE_STORE_FILE) \
                  storePassword RELEASE_STORE_PASSWORD \
                  keyAlias RELEASE_KEY_ALIAS \
                  keyPassword RELEASE_KEY_PASSWORD \
              } \
          }' android/app/build.gradle
          
          # 在 buildTypes 的 release 块中启用签名
          sed -i '/buildTypes {/,/}/ s/release {/release { signingConfig signingConfigs.release/' android/app/build.gradle
          sed -i '/release {/,/}/ s/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' android/app/build.gradle
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          # echo RELEASE_STORE_FILE=your-keystore-file.jks >> android/gradle.properties
          # echo RELEASE_STORE_PASSWORD=your-store-password >> android/gradle.properties
          # echo RELEASE_KEY_ALIAS=your-key-alias >> android/gradle.properties
          # echo  RELEASE_KEY_PASSWORD=your-key-password >> android/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: test print
        run: cat android/app/build.gradle

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --info
        env:
          # 以下变量会被 Expo 生成的 Gradle 脚本自动识别或用于覆盖
          RELEASE_STORE_FILE: android_release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          
          # 如果项目底层直接用的是标准 RN 变量名，也一并加上以保万一
          MYAPP_RELEASE_STORE_FILE: ../../android_release.keystore
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Get version name
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APKs
        run: |
          cd android/app/build/outputs/apk/release
          VERSION=${{ steps.version.outputs.version }}
          for ABI in arm64-v8a armeabi-v7a x86_64 universal; do
            SRC="app-${ABI}-release.apk"
            if [ -f "$SRC" ]; then
              mv "$SRC" "SyncClipboard-${VERSION}-${ABI}.apk"
            fi
          done
          
      - name: Publish signed apk package
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          draft: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
           android/app/build/outputs/apk/release/SyncClipboard-${{ steps.version.outputs.version }}-arm64-v8a.apk
          env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
